version: '3.8'

services:
  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    # container_name: omaya-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omaya-network

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: omaya-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER:-omaya_user}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD:-omaya_password}
      - TIMESCALE_DB=${TIMESCALE_DB:-omaya_monitoring}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:5173}
      - ENABLE_METRICS=true
    depends_on:
      redis:
        condition: service_started
      timescaledb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - ./backend/models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: omaya-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: omaya-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - omaya-network
  
  # Zookeeper (required for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: omaya-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    restart: unless-stopped
    networks:
      - omaya-network
  
  # TimescaleDB (PostgreSQL with time-series extension)
  timescaledb:
    image: timescale/timescaledb:2.11.0-pg15
    container_name: omaya-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${TIMESCALE_USER:-omaya_user}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD:-omaya_password}
      - POSTGRES_DB=${TIMESCALE_DB:-omaya_monitoring}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./backend/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omaya_user -d omaya_monitoring"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: omaya-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./backend/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - omaya-network
  
  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: omaya-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./backend/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - omaya-network
  
  # Grafana Dashboard
  grafana:
    image: grafana/grafana:10.1.0
    container_name: omaya-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana-data:/var/lib/grafana
      - ./backend/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - omaya-network
  
  # Redis Exporter (for Prometheus)
  redis-exporter:
    image: oliver006/redis_exporter:v1.54.0
    container_name: omaya-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - omaya-network
  
  # Node Exporter (system metrics)
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: omaya-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - omaya-network

  # MinIO (S3-compatible Data Lake)
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: omaya-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # HashiCorp Vault (Secrets Management)
  # WARNING: This is a development configuration. DO NOT use in production.
  # For production, use docker-compose.prod.yml with proper Vault setup.
  vault:
    image: hashicorp/vault:1.14.0
    container_name: omaya-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_DEV_ROOT_TOKEN_ID:-dev-token}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - omaya-network

networks:
  omaya-network:
    driver: bridge

volumes:
  redis-data:
  timescale-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  minio-data:
