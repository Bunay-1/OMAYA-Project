version: '3.8'

# PRODUCTION DOCKER COMPOSE FILE
# WARNING: This file contains NO hardcoded secrets. All secrets must be provided
# via environment variables or Vault. Do NOT copy secrets from dev configuration.

services:
  # Frontend (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omaya-frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - NGINX_SSL_ENABLED=${NGINX_SSL_ENABLED:-true}
      - NGINX_SSL_CERT=${NGINX_SSL_CERT}
      - NGINX_SSL_KEY=${NGINX_SSL_KEY}

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omaya-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TIMESCALE_HOST=timescaledb
      - TIMESCALE_PORT=5432
      - TIMESCALE_USER=${TIMESCALE_USER}
      - TIMESCALE_PASSWORD=${TIMESCALE_PASSWORD}
      - TIMESCALE_DB=${TIMESCALE_DB}
      - ENABLE_METRICS=true
      - JWT_SECRET=${JWT_SECRET}
      - VAULT_ADDR=${VAULT_ADDR:-https://vault:8200}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - ENV=production
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      vault:
        condition: service_started
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - ./backend/models:/app/models:ro
      - ./backend/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: omaya-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TimescaleDB (PostgreSQL with time-series extension)
  timescaledb:
    image: timescale/timescaledb:2.11.0-pg15
    container_name: omaya-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${TIMESCALE_USER}
      - POSTGRES_PASSWORD=${TIMESCALE_PASSWORD}
      - POSTGRES_DB=${TIMESCALE_DB}
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./backups/postgresql:/backups
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER} -d ${TIMESCALE_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: omaya-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: omaya-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: omaya-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./backend/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - omaya-network

  # Grafana
  grafana:
    image: grafana/grafana:10.1.0
    container_name: omaya-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=
      - GF_SERVER_ROOT_URL=${GRAFANA_SERVER_ROOT_URL}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./backend/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./backups/grafana:/backups/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - omaya-network

  # Alertmanager
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: omaya-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./backend/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped
    networks:
      - omaya-network

  # MinIO (S3-compatible Data Lake)
  minio:
    image: minio/minio:RELEASE.2023-09-04T19-57-37Z
    container_name: omaya-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - omaya-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # HashiCorp Vault (Production Configuration)
  # PRODUCTION: This uses proper Vault setup without dev mode
  vault:
    image: hashicorp/vault:1.14.0
    container_name: omaya-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_ADDR=${VAULT_ADDR:-http://0.0.0.0:8200}
      - VAULT_API_ADDR=${VAULT_API_ADDR:-http://0.0.0.0:8200}
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - omaya-network
    volumes:
      - vault-data:/data
      - ./vault/config:/vault/config:ro
      - ./vault/policies:/vault/policies:ro
      - ./vault/ssl:/vault/ssl:ro
    command: server

networks:
  omaya-network:
    driver: bridge

volumes:
  redis-data:
  timescale-data:
  kafka-data:
  zookeeper-data:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  minio-data:
  vault-data:
